worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ─── Upstream: backend replicas (docker compose scale) ───────────────────
    # When running with 'docker compose up --scale backend=2',
    # Nginx resolves 'backend' to all container IPs via Docker DNS.
    upstream backend_pool {
        least_conn;                  # Route to backend with fewest active connections
        server backend:8080;
        keepalive 32;
    }

    # ─── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── SignalR WebSocket proxy ──────────────────────────────────────────
        location /hubs/ {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Swagger UI (development) ─────────────────────────────────────────
        location /swagger {
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
        }

        # ── Health check endpoint ────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
