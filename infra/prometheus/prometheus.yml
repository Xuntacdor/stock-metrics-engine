global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # QuantIQ Backend API — Nginx proxies to backend:8080
  # Use Nginx's upstream name when scraping directly via internal network
  - job_name: 'quantiq-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'backend:8080'
    scrape_interval: 10s

  # Redis exporter (optional — uncomment if you add redis-exporter service)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
