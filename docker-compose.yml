version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Database (Primary)
  # ─────────────────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stock_db_primary
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - sqlserver_primary_data:/var/opt/mssql
      - sqlserver_backups:/backups                          # shared with secondary & backup sidecar
    networks:
      - quantiq_net
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Backup sidecar — takes full + periodic log backups from the primary
  # ─────────────────────────────────────────────────────────────────────────────
  db-backup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stock_db_backup
    entrypoint: /bin/bash /scripts/backup-loop.sh
    environment:
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - DB_NAME=QuantIQ_DB
      - BACKUP_DIR=/backups
    volumes:
      - ./infra/sqlserver/backup-loop.sh:/scripts/backup-loop.sh:ro
      - sqlserver_backups:/backups
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - quantiq_net
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # Database (Secondary / Read Replica via log-shipping)
  # ─────────────────────────────────────────────────────────────────────────────
  sqlserver-secondary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stock_db_secondary
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - sqlserver_secondary_data:/var/opt/mssql
      - sqlserver_backups:/backups                          # reads backups written by db-backup
      - ./infra/sqlserver/init-replication.sh:/scripts/init-replication.sh:ro
    networks:
      - quantiq_net
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Replication agent — applies log backups on the secondary
  # ─────────────────────────────────────────────────────────────────────────────
  db-replication:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stock_db_replication
    entrypoint: /bin/bash /scripts/init-replication.sh
    environment:
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - SA_PASS=${DB_PASSWORD}
      - DB_NAME=QuantIQ_DB
      - BACKUP_DIR=/backups
    volumes:
      - ./infra/sqlserver/init-replication.sh:/scripts/init-replication.sh:ro
      - sqlserver_backups:/backups
    depends_on:
      sqlserver-secondary:
        condition: service_healthy
      db-backup:
        condition: service_started
    networks:
      - quantiq_net
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — Cache + Token Blacklist + Celery broker
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stock_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - quantiq_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Sentiment service — FastAPI + HuggingFace model
  # ─────────────────────────────────────────────────────────────────────────────
  sentiment-service:
    build:
      context: ./src/crawler
      dockerfile: Dockerfile.sentiment
    container_name: stock_sentiment
    ports:
      - "8001:8001"
    environment:
      - SENTIMENT_MODEL=cardiffnlp/twitter-xlm-roberta-base-sentiment
    networks:
      - quantiq_net
    restart: on-failure
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s           # model download can take a while on first run

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery worker — executes crawl tasks
  # ─────────────────────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./src/crawler
      dockerfile: Dockerfile.crawler
    container_name: stock_celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q default,dead_letter
    environment:
      - REDIS_URL=redis://redis:6379/1
      - DB_SERVER=sqlserver
      - DB_NAME=QuantIQ_DB
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SENTIMENT_SERVICE_URL=http://sentiment-service:8001/analyze
    volumes:
      - ./src/crawler:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      sentiment-service:
        condition: service_healthy
    networks:
      - quantiq_net
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery beat — triggers scheduled crawl tasks
  # ─────────────────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./src/crawler
      dockerfile: Dockerfile.crawler
    container_name: stock_celery_beat
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule=/tmp/celerybeat-schedule
    environment:
      - REDIS_URL=redis://redis:6379/1
      - DB_SERVER=sqlserver
      - DB_NAME=QuantIQ_DB
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - SENTIMENT_SERVICE_URL=http://sentiment-service:8001/analyze
    volumes:
      - ./src/crawler:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - quantiq_net
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend API (2 replicas behind Nginx)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend-api.Api
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=QuantIQ_DB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=true;
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=QuantIQ
      - JwtSettings__Audience=QuantIQApp
      - JwtSettings__ExpiresInMinutes=60
      - Redis__ConnectionString=redis:6379
      - PayOS__ClientId=${PayOS__ClientId}
      - PayOS__ApiKey=${PayOS__ApiKey}
      - PayOS__ChecksumKey=${PayOS__ChecksumKey}
      - FptAi__ApiKey=${FptAi__ApiKey}
      - AdminSeed__Password=${AdminSeed__Password}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantiq_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx — Load Balancer
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: stock_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - quantiq_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Prometheus — Metrics Scraping
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stock_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - quantiq_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Grafana — Dashboards
  # ─────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stock_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - quantiq_net

volumes:
  sqlserver_primary_data:
  sqlserver_secondary_data:
  sqlserver_backups:                # shared between primary, secondary, backup sidecar, replication agent
  redis_data:
  prometheus_data:
  grafana_data:


networks:
  quantiq_net:
    driver: bridge
